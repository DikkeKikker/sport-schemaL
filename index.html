<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Training</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
  --bg: #ffffff;
  --surface: #f5f5f5;
  --surface2: #eeeeee;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #0f0f0f;
  --muted: rgba(0,0,0,0.55);
  --accent: #cd9adb;
  --accent-dim: rgba(205,154,219,0.15);
  --accent-text: #ffffff;
  --push: #c77c5d;
  --pull: #4d86c7;
  --legs: #8b5fbf;
  --cardio: #3fbf9f;
  --full: #c7b84d;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* Header */
  .header {
    padding: 52px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,15,15,0.97);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--mono);
  }

  /* Week navigator */
  .week-nav {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    overflow: hidden;
  }

  .week-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    padding: 5px 11px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.15s;
  }
  .week-btn:active { color: var(--accent); }
  .week-btn:disabled { opacity: 0.25; cursor: default; }

  .week-label {
    font-size: 12px;
    color: var(--text);
    font-family: var(--mono);
    padding: 5px 6px;
    white-space: nowrap;
    min-width: 64px;
    text-align: center;
  }

  .week-current-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
    margin-bottom: 1px;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: var(--mono);
    letter-spacing: 0.03em;
    position: relative;
  }

  .day-tab.active {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    font-weight: 500;
  }

  .day-tab.rest { opacity: 0.4; }

  .day-tab .has-data {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }
  .day-tab.active .has-data { background: var(--accent-text); }

  /* Content */
  .content {
    padding: 20px 16px 100px;
  }

  .session-header {
    margin-bottom: 20px;
  }

  .session-name {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    color: var(--text);
  }

  .session-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .session-badge {
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge-push { background: rgba(232,168,124,0.15); color: var(--push); }
  .badge-pull { background: rgba(124,184,232,0.15); color: var(--pull); }
  .badge-benen { background: rgba(176,124,232,0.15); color: var(--legs); }
  .badge-cardio { background: rgba(124,232,192,0.15); color: var(--cardio); }
  .badge-full { background: rgba(232,216,124,0.15); color: var(--full); }
  .badge-rust { background: rgba(255,255,255,0.06); color: var(--muted); }

  .session-time {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* Rest day */
  .rest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
  }
  .rest-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

  /* Exercise cards */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }

  .ex-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
    cursor: pointer;
  }

  .ex-name-wrap { flex: 1; }

  .ex-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .ex-advice {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    margin-top: 3px;
    opacity: 0.85;
  }

  .ex-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .ex-scheme {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .ex-chart-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 13px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .ex-chart-btn:active { background: var(--accent-dim); color: var(--accent); }

  /* Set inputs */
  .sets-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .set-block {
    flex: 1;
    min-width: 60px;
    max-width: 90px;
  }

  .set-num {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .set-input-wrap { position: relative; }

  .set-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 9px 28px 9px 10px;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }

  .set-input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(200,240,110,0.05);
  }

  .set-input::placeholder { color: rgba(240,237,232,0.2); }

  .set-input.has-prev::placeholder { color: rgba(200,240,110,0.35); }

  .set-unit {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    pointer-events: none;
  }

  .no-weight-note {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
    padding: 6px 0 2px;
  }

  /* Note */
  .note-wrap { margin-top: 10px; }

  .note-input {
    width: 100%;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 0 2px;
    resize: none;
    line-height: 1.4;
    min-height: 28px;
  }
  .note-input:focus { outline: none; color: var(--text); }
  .note-input::placeholder { color: rgba(240,237,232,0.18); }

  /* Save bar */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    background: rgba(15,15,15,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    z-index: 200;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .save-btn {
    flex: 1;
    padding: 13px;
    background: var(--accent);
    color: var(--accent-text);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-appearance: none;
  }
  .save-btn:active { opacity: 0.75; }
  .save-btn.saved {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid rgba(200,240,110,0.3);
  }

  .clear-btn {
    padding: 13px 16px;
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .clear-btn:active { opacity: 0.6; }

  /* Tip */
  .tip-card {
    margin-top: 12px;
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,110,0.15);
    border-radius: var(--r);
    padding: 12px 14px;
    font-size: 13px;
    color: rgba(200,240,110,0.85);
    line-height: 1.5;
  }

  /* Divider */
  .section-divider {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* === CHART MODAL === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    backdrop-filter: blur(4px);
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 600px;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height: 75vh;
    overflow-y: auto;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .modal-title {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .modal-sub {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 20px;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Chart */
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 180px;
    margin-bottom: 12px;
  }

  .chart-canvas {
    width: 100%;
    height: 100%;
  }

  .chart-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
  }

  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    margin-top: 8px;
  }

  .legend-item {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* Stat row */
  .stat-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .stat-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .stat-val {
    font-size: 18px;
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text);
  }

  .stat-val.pos { color: var(--accent); }
  .stat-val.neg { color: #e87c7c; }

  /* Readonly mode banner */
  .readonly-banner {
    background: rgba(232,168,124,0.1);
    border: 1px solid rgba(232,168,124,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--push);
    margin-bottom: 14px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">Training</span>
    <div class="week-nav">
      <button class="week-btn" id="prev-week-btn" onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="week-label">—</span>
      <button class="week-btn" id="next-week-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
</div>

<div class="content" id="content"></div>

<div class="save-bar" id="save-bar">
  <button class="save-btn" id="save-btn" onclick="saveSession()">Opslaan</button>
  <button class="clear-btn" onclick="clearSession()">Wis</button>
</div>

<!-- Chart Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modal-title">—</div>
    <div class="modal-sub" id="modal-sub">Gewicht over tijd</div>
    <div class="chart-wrap">
      <canvas class="chart-canvas" id="chart-canvas"></canvas>
      <div class="chart-empty" id="chart-empty" style="display:none">Nog geen data beschikbaar.<br>Sla een paar sessies op om progressie te zien.</div>
    </div>
    <div class="chart-legend" id="chart-legend"></div>
    <div class="stat-row" id="stat-row"></div>
  </div>
</div>

<script>
// =====================
// SESSIONS CONFIG
// =====================
const sessions = [
  {
    id: "ma", label: "Ma", type: "pull-up focused", typeName: "Pull-up focused",
    name: "Muscle-up Monday", time: "~40 min",
    tip: "[TIP]",
    exercises: [
      { id: "hanging_knee", name: "Hanging knee raises", sets: 3, reps: "10–12", trackType: "reps" },
      { id: "australian_pull", name: "Australian pull-up", sets: 3, reps: "10", trackType: "reps" },
      { id: "pull_up_ass", name: "Pull up assisted", sets: 3, reps: "12", trackType: "weight" },
      { id: "push_up", name: "Push ups", sets: 3, reps: "15", trackType: "reps" },
      { id: "barbell_row", name: "Barbell rows", sets: 3, reps: "12", trackType: "weight" },
      { id: "tricep_ext", name: "Triceps extensions", sets: 3, reps: "12", trackType: "weight" },
      { id: "dip", name: "Dips", sets: 3, reps: "12", trackType: "reps" },

  },

    exercises: [
      { id: "bent_row", name: "Bent-over row", sets: 4, reps: "10", trackType: "weight" },

      { id: "curl", name: "Dumbbell curl", sets: 3, reps: "12", trackType: "weight" },

    ]
  },
  {
    id: "wo", label: "Wo", type: "rust", typeName: "Rust",
    name: "Rust", time: "—",
    tip: "Volledige rustdag.",
    exercises: []
  },
  {
    id: "do", label: "Do", type: "cardio", typeName: "Cardio + core",
    name: "Cardio + core", time: "~35 min",
    tip: "Actieve rust.",
    exercises: [
      { id: "vr_box", name: "VR cardio boksen", sets: 1, reps: "20 min", trackType: "reps" },
      { id: "plank", name: "Plank", sets: 3, reps: "45 sec", trackType: "reps" },
      { id: "deadbug", name: "Dead bug", sets: 3, reps: "10 p.z.", trackType: "reps" },
      { id: "woodchop", name: "Band woodchop", sets: 3, reps: "12 p.z.", trackType: "weight" },
    ]
  },
  {
    id: "vr", label: "Vr", type: "benen", typeName: "Benen & billen",
    name: "Benen & billen", time: "~45 min",
    tip: "Zwaarste sessie.",
    exercises: [
      { id: "goblet", name: "Goblet squat", sets: 4, reps: "12", trackType: "weight" },
      { id: "rdl", name: "Romanian deadlift", sets: 4, reps: "10", trackType: "weight" },
      { id: "lunge", name: "Dumbbell lunges", sets: 3, reps: "12 p.z.", trackType: "weight" },
      { id: "bridge", name: "Glute bridge", sets: 3, reps: "15", trackType: "reps" },
      { id: "crab", name: "Band crab walk", sets: 3, reps: "15 p.z.", trackType: "reps" },
    ]
  },
  {
    id: "za", label: "Za", type: "full", typeName: "Full body",
    name: "Full body", time: "~45 min",
    tip: "Compound focus.",
    exercises: [
      { id: "thruster", name: "Dumbbell thruster", sets: 4, reps: "10", trackType: "weight" },
      { id: "renegade", name: "Renegade row", sets: 3, reps: "8 p.z.", trackType: "weight" },
      { id: "sumo", name: "Sumo deadlift", sets: 3, reps: "12", trackType: "weight" },
      { id: "arnold", name: "Arnold press", sets: 3, reps: "10", trackType: "weight" },
      { id: "bodypump", name: "Bodypump circuit", sets: 1, reps: "10 min", trackType: "reps" },
    ]
  },
  {
    id: "zo", label: "Zo", type: "rust", typeName: "Rust",
    name: "Rust", time: "—",
    tip: "Herstel.",
    exercises: []
  }
];

// =====================
// STATE
// =====================
let weekOffset = 0;
let activeDay = 0;

// =====================
// STORAGE HELPERS
// =====================
function loadAllData() {
  try { return JSON.parse(localStorage.getItem('trainingData')) || {}; }
  catch { return {}; }
}

function saveAllData(data) {
  localStorage.setItem('trainingData', JSON.stringify(data));
}

function setExData(wk, dayId, exId, data) {
  const all = loadAllData();
  if (!all[wk]) all[wk] = {};
  if (!all[wk][dayId]) all[wk][dayId] = {};
  all[wk][dayId][exId] = data;
  saveAllData(all);
}

function getExData(wk, dayId, exId) {
  return (loadAllData()[wk]?.[dayId]?.[exId]) || { sets: [], note: "" };
}

// =====================
// WEEK HELPERS
// =====================
function isoWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function currentWeekKey() {
  const d = new Date();
  d.setDate(d.getDate() + weekOffset * 7);
  return `${d.getFullYear()}-W${String(isoWeekNumber(d)).padStart(2,'0')}`;
}

function weekKeyToLabel(wk) {
  const [y,w] = wk.split('-W');
  return `W${w} '${y.slice(2)}`;
}

const isCurrentWeek = () => weekOffset === 0;

// =====================
// RENDER
// =====================
function renderContent() {
  const s = sessions[activeDay];
  const wk = currentWeekKey();
  const isNow = isCurrentWeek();

  const content = document.getElementById("content");
  let html = `<div class="session-name">${s.name}</div>`;

  for (const ex of s.exercises) {
    const data = getExData(wk, s.id, ex.id);
    const isReps = ex.trackType === "reps";

    html += `
      <div class="ex-card">
        <div class="ex-top"
             onclick="openChart('${s.id}','${ex.id}','${ex.name.replace(/'/g,"\\'")}')">

          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-scheme">
              ${isReps ? `${ex.sets}×${ex.reps} (BW)` : `${ex.sets}×${ex.reps} kg`}
            </div>
          </div>
        </div>

        <div class="sets-row">
    `;

    for (let i = 0; i < ex.sets; i++) {
      const val = data.sets?.[i] || "";

      html += `
        <input class="set-input"
               type="number"
               value="${val}"
               ${!isNow ? "readonly" : ""}
               id="inp_${s.id}_${ex.id}_${i}">
      `;
    }

    html += `</div></div>`;
  }

  content.innerHTML = html;
}

// =====================
// SAVE
// =====================
function saveSession() {
  const s = sessions[activeDay];
  const wk = currentWeekKey();

  for (const ex of s.exercises) {
    const sets = [];

    for (let i = 0; i < ex.sets; i++) {
      const el = document.getElementById(`inp_${s.id}_${ex.id}_${i}`);
      sets.push(el?.value || "");
    }

    setExData(wk, s.id, ex.id, { sets });
  }

  alert("Opgeslagen");
}

// =====================
// CHART (simpified safe version)
// =====================
function openChart(dayId, exId, exName) {
  const all = loadAllData();

  const points = Object.keys(all)
    .sort()
    .map(wk => {
      const ex = all[wk]?.[dayId]?.[exId];
      if (!ex) return null;

      const vals = (ex.sets || []).map(v => parseFloat(v)).filter(v => !isNaN(v));
      if (!vals.length) return null;

      return {
        wk,
        avg: vals.reduce((a,b)=>a+b,0)/vals.length
      };
    })
    .filter(Boolean);

  console.log(exName, points);
  alert("Chart data in console (basis fix actief)");
}

// =====================
// INIT
// =====================
function init() {
  renderContent();
}

init();
</script>
